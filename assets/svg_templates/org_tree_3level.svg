<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 800">
  <!-- Top -->
  <rect x="680"  y="60"  width="400" height="140" rx="14" fill="#C82E6E"/>
  <text x="880"  y="140" font-family="Inter, Segoe UI, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" font-weight="bold">{{level_1}}</text>
  <!-- Lines to middle -->
  <line x1="880" y1="200" x2="880" y2="260" stroke="#1F1F1F" stroke-width="3"/>
  <line x1="280" y1="260" x2="1480" y2="260" stroke="#1F1F1F" stroke-width="3"/>
  <line x1="280" y1="260" x2="280" y2="320" stroke="#1F1F1F" stroke-width="3"/>
  <line x1="880" y1="260" x2="880" y2="320" stroke="#1F1F1F" stroke-width="3"/>
  <line x1="1480" y1="260" x2="1480" y2="320" stroke="#1F1F1F" stroke-width="3"/>
  <!-- Middle 3 boxes -->
  <rect x="80"   y="320" width="400" height="140" rx="14" fill="#769E2E"/>
  <text x="280"  y="400" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">{{level_2a}}</text>
  <rect x="680"  y="320" width="400" height="140" rx="14" fill="#769E2E"/>
  <text x="880"  y="400" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">{{level_2b}}</text>
  <rect x="1280" y="320" width="400" height="140" rx="14" fill="#769E2E"/>
  <text x="1480" y="400" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="bold">{{level_2c}}</text>
  <!-- Bottom (single box, base operativa) -->
  <rect x="480"  y="560" width="800" height="140" rx="14" fill="#FDE7EE" stroke="#C82E6E" stroke-width="3"/>
  <text x="880"  y="640" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#1F1F1F" text-anchor="middle" font-weight="bold">{{level_3}}</text>
</svg>
