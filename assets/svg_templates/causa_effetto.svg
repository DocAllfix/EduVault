  <text x="280"  y="430" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#1F1F1F" text-anchor="middle">{{causa}}</text>
  <line x1="510" y1="400" x2="610" y2="400" stroke="#C82E6E" stroke-width="12" marker-end="url(#arrow_thick)"/>
