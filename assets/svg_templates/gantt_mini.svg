<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 800">
  <!-- Title -->
  <text x="880" y="60" font-family="Inter, Segoe UI, sans-serif" font-size="28" fill="#1F1F1F" text-anchor="middle" font-weight="bold">{{title}}</text>
  <!-- Time axis labels -->
  <text x="540" y="140" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#769E2E" text-anchor="middle" font-weight="bold">{{period_1}}</text>
  <text x="900" y="140" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#769E2E" text-anchor="middle" font-weight="bold">{{period_2}}</text>
  <text x="1260" y="140" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#769E2E" text-anchor="middle" font-weight="bold">{{period_3}}</text>
  <!-- Vertical grid lines -->
  <line x1="360" y1="160" x2="360" y2="720" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="720" y1="160" x2="720" y2="720" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="1080" y1="160" x2="1080" y2="720" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="1440" y1="160" x2="1440" y2="720" stroke="#CCCCCC" stroke-width="1"/>
  <!-- Task 1 -->
  <text x="40" y="220" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#1F1F1F" font-weight="bold">{{task_1_label}}</text>
  <rect x="360" y="190" width="500" height="56" rx="10" fill="#C82E6E"/>
  <text x="610" y="226" font-family="Inter, Segoe UI, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">{{task_1_detail}}</text>
  <!-- Task 2 -->
  <text x="40" y="320" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#1F1F1F" font-weight="bold">{{task_2_label}}</text>
  <rect x="540" y="290" width="600" height="56" rx="10" fill="#769E2E"/>
  <text x="840" y="326" font-family="Inter, Segoe UI, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">{{task_2_detail}}</text>
  <!-- Task 3 -->
  <text x="40" y="420" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#1F1F1F" font-weight="bold">{{task_3_label}}</text>
  <rect x="720" y="390" width="540" height="56" rx="10" fill="#C82E6E"/>
  <text x="990" y="426" font-family="Inter, Segoe UI, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">{{task_3_detail}}</text>
  <!-- Task 4 -->
  <text x="40" y="520" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#1F1F1F" font-weight="bold">{{task_4_label}}</text>
  <rect x="900" y="490" width="540" height="56" rx="10" fill="#769E2E"/>
  <text x="1170" y="526" font-family="Inter, Segoe UI, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">{{task_4_detail}}</text>
  <!-- Task 5 -->
  <text x="40" y="620" font-family="Inter, Segoe UI, sans-serif" font-size="22" fill="#1F1F1F" font-weight="bold">{{task_5_label}}</text>
  <rect x="1080" y="590" width="360" height="56" rx="10" fill="#C82E6E"/>
  <text x="1260" y="626" font-family="Inter, Segoe UI, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">{{task_5_detail}}</text>
</svg>
