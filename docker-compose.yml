version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - output_data:/app/output

  postgres:
    image: pgvector/pgvector:pg16
    # NESSUN port mapping esterno — accessibile solo dalla rete Docker interna
    expose:
      - "5432"
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_admin"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    # NOT YET BUILT — placeholder filled in PHASE 6 (shadcn-admin clone).
    # Enabled only with --profile full.
    profiles: ["full"]
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000

  nginx:
    # Reverse proxy — useful only with frontend up (PHASE 6+).
    # Enabled only with --profile full.
    profiles: ["full"]
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  output_data:
